<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AnimTracer</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="toolbar">
      <button id="btn-refresh" title="Refresh hierarchy">↻</button>
      <label class="auto-refresh">
        <input type="checkbox" id="auto-refresh" checked />
        Auto
      </label>
      <span id="status" class="status">Waiting for Cocos…</span>
      <span id="build-note" class="build-note" title="AnimTracer build info"></span>
    </header>

    <div class="filter-bar">
      <input type="search" id="search" placeholder="Filter by name…" />
      <select id="component-filter" title="Filter by component">
        <option value="">All components</option>
      </select>
      <button id="btn-clear-filters" title="Clear filters" hidden>✕</button>
    </div>

    <main class="layout">
      <section class="tree-panel">
        <div class="tree-toolbar">
          <button id="btn-expand-all" type="button" title="Expand all nodes">Expand all</button>
          <button id="btn-collapse-all" type="button" title="Collapse all nodes">Collapse all</button>
        </div>
        <div id="tree" class="tree"></div>
      </section>
      <div
        id="tools-resizer"
        class="panel-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize tools panel"
      ></div>
      <section class="detail-panel">
        <h2>Tools</h2>
        <div class="tool-box">
          <label for="ref-uuid-input">Find node references</label>
          <div class="tool-row">
            <input id="ref-uuid-input" type="text" placeholder="Node UUID (empty = selected node)" />
            <button id="btn-find-refs" type="button">Find</button>
          </div>
        </div>
        <div id="spine-trace-tool" class="tool-box" hidden>
          <label for="spine-animation-input">Trace Spine animation</label>
          <div class="tool-row">
            <input
              id="spine-animation-input"
              type="text"
              placeholder="Animation name"
              list="spine-animation-suggestions"
            />
            <datalist id="spine-animation-suggestions"></datalist>
            <button id="btn-trace-spine" type="button">Trace</button>
          </div>
          <div id="spine-animation-suggestion-list" class="suggestion-list" hidden></div>
        </div>
        <div class="tool-box">
          <label>Reference results</label>
          <div id="reference-results" class="reference-results empty">No results yet.</div>
        </div>
        <div id="tool-status" class="tool-status">Actions log to page console.</div>
        <h2>Node Details</h2>
        <div id="detail" class="detail empty">Select a node</div>
      </section>
    </main>

    <script src="build-info.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
